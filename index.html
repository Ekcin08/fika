<script>

const result=document.getElementById("result");
const countdown=document.getElementById("countdown");
const namedayEl=document.getElementById("nameday");

const race=document.getElementById("raceContainer");
const cupWrap=document.getElementById("cupWrap");
const steam=document.getElementById("steam");

/* =========================
   SVENSK TID (STABIL)
========================= */
function getSwedishDate(){
  return new Date(
    new Date().toLocaleString("en-US", {
      timeZone: "Europe/Stockholm"
    })
  );
}

/* =========================
   NAMNSDAG
========================= */
function loadNameday(){
  const now=getSwedishDate();
  const y=now.getFullYear();
  const m=String(now.getMonth()+1).padStart(2,"0");
  const d=String(now.getDate()).padStart(2,"0");

  fetch(`https://api.dryg.net/dagar/v2.1/${y}/${m}/${d}`)
    .then(r=>r.json())
    .then(data=>{
      const names=data.dagar[0].namnsdag;
      namedayEl.textContent="Namnsdag: "+names.join(", ");
    })
    .catch(()=>{
      namedayEl.textContent="Namnsdag saknas";
    });
}

/* =========================
   FIKA LOGIK
========================= */
function checkFika(){

const now=getSwedishDate();

const day=now.getDay();
const hour=now.getHours();
const min=now.getMinutes();

const isWeekend=(day===0||day===6);

/* ===== SKAPA RIKTIGA TIDPUNKTER ===== */
const fikaStart=new Date(now);
fikaStart.setHours(15,0,0,0);

const fikaEnd=new Date(now);
fikaEnd.setHours(15,15,0,0);

const missedStart=new Date(now);
missedStart.setHours(15,30,0,0);

const missedEnd=new Date(now);
missedEnd.setHours(15,45,0,0);

const raceStart=new Date(now);
raceStart.setHours(14,45,0,0);

/* helg fredag efter fika */
const fridayAfter=(day===5 && now>fikaEnd);

/* reset */
result.classList.remove("pulse");
steam.style.display="none";
race.style.display="none";

/* =========================
   HELG
========================= */
if(isWeekend || fridayAfter){
  result.textContent="NU ÄR DET HELG 🎉";
  countdown.textContent="";
  return;
}

/* =========================
   MISSADE
========================= */
if(now>=missedStart && now<missedEnd){
  result.textContent="DU MISSADE FIKAT";
  countdown.textContent="";
  return;
}

/* =========================
   RACE
========================= */
if(now>=raceStart && now<fikaStart){
  race.style.display="block";

  const total=fikaStart-raceStart;
  const progress=(now-raceStart)/total;

  const width=race.offsetWidth-40;
  cupWrap.style.left=(progress*width)+"px";
}

/* =========================
   SNART
========================= */
else if(now>=new Date(fikaStart-5*60000) && now<fikaStart){
  result.textContent="SNART ☕";
  result.classList.add("pulse");
  steam.style.display="block";
}

/* =========================
   FIKA
========================= */
else if(now>=fikaStart && now<=fikaEnd){
  result.textContent="JA ☕";
  countdown.textContent="";
}

/* =========================
   NEJ + RÄKNARE
========================= */
else{

  result.textContent="NEJ";

  let target=new Date(fikaStart);

  if(now>fikaEnd){
    target.setDate(target.getDate()+1);
  }

  const diff=Math.max(0,target-now);

  const mins=Math.floor(diff/60000);
  const secs=Math.floor((diff%60000)/1000);

  countdown.textContent=
    `Nästa fika om ${mins}m ${secs}s`;
}

}

loadNameday();
checkFika();
setInterval(checkFika,1000);

</script>
