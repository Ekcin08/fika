<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Är det fika?</title>
  <style>
    body {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      font-size: 5rem;
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <div id="result"></div>

  <script>
    const result = document.getElementById("result");

    function checkFika() {
      const now = new Date();
      const hour = now.getHours();
      const minutes = now.getMinutes();

      if (hour === 15 && minutes >= 0 && minutes <= 15) {
        result.textContent = "JA ☕";
      } else {
        result.textContent = "NEJ";
      }
    }

    // Kör direkt
    checkFika();

    // Uppdatera varje sekund
    setInterval(checkFika, 1000);
  </script>
</body>
</html>
