<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Är det fika?</title>

<style>
body {
  display:flex;
  flex-direction:column;
  height:100vh;
  justify-content:center;
  align-items:center;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  margin:0;
  text-align:center;
}

#nameday{
  position:fixed;
  top:10px;
  left:15px;
  font-size:1rem;
  opacity:0.8;
}

#result{font-size:4rem;}
#countdown{font-size:1.5rem;margin-top:10px;color:#555;}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}
.pulse{animation:pulse 1s infinite;}

/* RACE */
#raceContainer{
position:fixed;
bottom:20px;
left:5%;
width:90%;
height:80px;
display:none;
}
#track{position:absolute;bottom:20px;width:100%;height:6px;background:#ccc;}
#finish{position:absolute;right:0;bottom:10px;}

#cupWrap{
position:absolute;
bottom:30px;
left:0;
display:flex;
flex-direction:column;
align-items:center;
}

#steam{height:20px;display:none;position:relative;}
#steam::before,#steam::after{
content:"☁️";
position:absolute;
font-size:1rem;
animation:steam 1.5s infinite;
opacity:0;
}
#steam::after{left:10px;animation-delay:.7s;}

@keyframes steam{
0%{transform:translateY(5px);opacity:0;}
50%{opacity:.8;}
100%{transform:translateY(-15px);opacity:0;}
}
</style>
</head>

<body>

<div id="nameday">Laddar...</div>

<h1>Är det fika?</h1>
<div id="result"></div>
<div id="countdown"></div>

<div id="raceContainer">
  <div id="track"></div>
  <div id="cupWrap">
    <div id="steam"></div>
    <div>☕</div>
  </div>
  <div id="finish">🏁</div>
</div>

<script>

const result=document.getElementById("result");
const countdown=document.getElementById("countdown");
const namedayEl=document.getElementById("nameday");
const race=document.getElementById("raceContainer");
const cupWrap=document.getElementById("cupWrap");
const steam=document.getElementById("steam");

/* ===== SVENSK TID (FIX 1h BUGG) ===== */
function getSwedishTime(){
const now=new Date();

const parts=new Intl.DateTimeFormat("sv-SE",{
timeZone:"Europe/Stockholm",
hour:"numeric",
minute:"numeric",
second:"numeric",
weekday:"short"
}).formatToParts(now);

const hour=+parts.find(p=>p.type==="hour").value;
const min=+parts.find(p=>p.type==="minute").value;
const sec=+parts.find(p=>p.type==="second").value;

const map={mån:1,tis:2,ons:3,tors:4,fre:5,lör:6,sön:0};
const day=map[parts.find(p=>p.type==="weekday").value];

return {hour,min,sec,day};
}

/* ===== NAMNSDAG ===== */
function loadNameday(){
const now=new Date();
const y=now.getFullYear();
const m=String(now.getMonth()+1).padStart(2,"0");
const d=String(now.getDate()).padStart(2,"0");

fetch(`https://api.dryg.net/dagar/v2.1/${y}/${m}/${d}`)
.then(r=>r.json())
.then(data=>{
const names=data.dagar[0].namnsdag;
namedayEl.textContent="Namnsdag: "+names.join(", ");
})
.catch(()=>namedayEl.textContent="Namnsdag saknas");
}

/* ===== FIKA ===== */
function checkFika(){

const {hour,min,sec,day}=getSwedishTime();
const time=hour*60+min+sec/60;

const fikaStart=15*60;
const fikaEnd=fikaStart+15;

const missedStart=15*60+30;
const missedEnd=15*60+45;

const isWeekend=(day===0||day===6);
const isFridayAfterFika=(day===5 && time>fikaEnd);

result.classList.remove("pulse");
steam.style.display="none";

/* HELG */
if(isWeekend||isFridayAfterFika){
result.textContent="NU ÄR DET HELG 🎉";
race.style.display="none";

let days=(8-day)%7;
if(days===0)days=7;

const total=days*1440+(fikaStart-time);

countdown.textContent=
`Nästa fika om ${Math.floor(total/60)}h ${Math.floor(total%60)}m`;
return;
}

/* MISSADE */
if(time>=missedStart && time<missedEnd){
result.textContent="DU MISSADE FIKAT";
race.style.display="none";
countdown.textContent="";
return;
}

/* RACE */
if(time>=14*60+45 && time<=fikaStart){
race.style.display="block";

const progress=(time-(14*60+45))/15;
const width=race.offsetWidth-40;

cupWrap.style.left=(progress*width)+"px";
}else{
race.style.display="none";
}

/* SNART */
if(time>=fikaStart-5 && time<fikaStart){
result.textContent="SNART ☕";
result.classList.add("pulse");
steam.style.display="block";
return;
}

/* JA */
if(time>=fikaStart && time<=fikaEnd){
result.textContent="JA ☕";
countdown.textContent="";
return;
}

/* NEJ */
result.textContent="NEJ";

let next=fikaStart;
if(time>fikaEnd)next+=1440;

const diff=next-time;

countdown.textContent=
`Nästa fika om ${Math.floor(diff/60)}m ${Math.floor((diff*60)%60)}s`;

}

loadNameday();
checkFika();
setInterval(checkFika,1000);

</script>

</body>
</html>
