<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Är det fika?</title>

  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      font-weight: normal;
    }

    #status {
      font-size: 1.3rem;
      color: #444;
      margin-bottom: 1rem;
    }

    #result {
      font-size: 5rem;
    }

    #countdown {
      font-size: 1.5rem;
      margin-top: 1rem;
      color: #555;
    }

    /* SNART pulse */
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    .pulse {
      animation: pulse 1s infinite;
    }

    /* steam */
    #steam {
      height: 40px;
      margin-bottom: 10px;
      display: none;
      position: relative;
    }

    #steam::before,
    #steam::after {
      content: "☁️";
      position: absolute;
      font-size: 1.5rem;
      animation: steam 1.5s infinite ease-in-out;
      opacity: 0;
    }

    #steam::after {
      left: 20px;
      animation-delay: 0.7s;
    }

    @keyframes steam {
      0% { transform: translateY(10px); opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-20px); opacity: 0; }
    }

    /* ===== FIKA RACE ===== */

    #raceContainer {
      position: fixed;
      bottom: 20px;
      left: 5%;
      width: 90%;
      height: 60px;
      display: none;
    }

    #track {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      height: 4px;
      background: #ccc;
      border-radius: 2px;
    }

    #cup {
      position: absolute;
      bottom: 30px;
      left: 0;
      font-size: 1.8rem;
      transform: translateX(0);
    }

    #finish {
      position: absolute;
      right: 0;
      bottom: 10px;
      font-size: 1.2rem;
    }

    /* animation kopp */
    .move {
      animation: moveCup 900s linear forwards;
    }

    @keyframes moveCup {
      from { left: 0; }
      to { left: calc(100% - 30px); }
    }
  </style>
</head>

<body>
  <h1>Är det fika?</h1>

  <div id="status"></div>

  <div id="steam"></div>
  <div id="result"></div>

  <div id="countdown"></div>

  <!-- race längst ner -->
  <div id="raceContainer">
    <div id="track"></div>
    <div id="cup">☕</div>
    <div id="finish">🏁</div>
  </div>

  <script>
    const status = document.getElementById("status");
    const result = document.getElementById("result");
    const countdown = document.getElementById("countdown");
    const steam = document.getElementById("steam");

    const race = document.getElementById("raceContainer");
    const cup = document.getElementById("cup");

    function checkFika() {
      const now = new Date();
      const hour = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();

      const currentTotal = hour * 60 + minutes + seconds / 60;

      const fikaStart = 15 * 60;
      const fikaEnd = fikaStart + 15;
      const raceStart = 14 * 60 + 45;

      result.classList.remove("pulse");
      steam.style.display = "none";

      /* ===== RACE (14:45 -> 15:00) ===== */
      if (currentTotal >= raceStart && currentTotal <= fikaStart) {
        race.style.display = "block";

        const progress = (currentTotal - raceStart) / (15); 
        cup.style.left = (progress * 100) + "%";

        if (currentTotal >= fikaStart) {
          cup.style.left = "100%";
        }
      } else {
        race.style.display = "none";
      }

      /* ===== SNART ===== */
      if (currentTotal >= fikaStart - 5 && currentTotal < fikaStart) {
        status.textContent = "Fika börjar snart";
        result.textContent = "SNART ☕";
        result.classList.add("pulse");
        steam.style.display = "block";
        countdown.textContent = "";
      }

      /* ===== FIKA ===== */
      else if (currentTotal >= fikaStart && currentTotal <= fikaEnd) {
        status.textContent = "Det är fikatid";
        result.textContent = "JA ☕";
        countdown.textContent = "";
      }

      /* ===== NEJ ===== */
      else {
        status.textContent = "Ingen fika just nu";
        result.textContent = "NEJ";

        let nextFika = fikaStart;
        if (currentTotal > fikaEnd) {
          nextFika = fikaStart + 24 * 60;
        }

        const diff = Math.max(0, nextFika - currentTotal);

        const h = Math.floor(diff / 60);
        const m = Math.floor(diff % 60);
        const s = Math.floor((diff * 60) % 60);

        countdown.textContent =
          `Nästa fika om ${h > 0 ? h + "h " : ""}${m}m ${s}s`;
      }
    }

    checkFika();
    setInterval(checkFika, 1000);
  </script>
</body>
</html>
