<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Är det fika?</title>

  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      font-weight: normal;
    }

    #status {
      font-size: 1.3rem;
      color: #444;
      margin-bottom: 1rem;
    }

    #result {
      font-size: 4rem;
    }

    #countdown {
      font-size: 1.5rem;
      margin-top: 1rem;
      color: #555;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    .pulse {
      animation: pulse 1s infinite;
    }

    /* RACE */
    #raceContainer {
      position: fixed;
      bottom: 20px;
      left: 5%;
      width: 90%;
      height: 80px;
      display: none;
    }

    #track {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      height: 6px;
      background: #ccc;
      border-radius: 3px;
    }

    #finish {
      position: absolute;
      right: 0;
      bottom: 10px;
      font-size: 1.2rem;
    }

    #cupWrap {
      position: absolute;
      bottom: 30px;
      left: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #cup {
      font-size: 2rem;
    }

    #steam {
      height: 20px;
      position: relative;
      margin-bottom: 2px;
      display: none;
    }

    #steam::before,
    #steam::after {
      content: "☁️";
      position: absolute;
      font-size: 1rem;
      animation: steam 1.5s infinite ease-in-out;
      opacity: 0;
    }

    #steam::after {
      left: 10px;
      animation-delay: 0.7s;
    }

    @keyframes steam {
      0% { transform: translateY(5px); opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-15px); opacity: 0; }
    }
  </style>
</head>

<body>
  <h1>Är det fika?</h1>

  <div id="status"></div>
  <div id="result"></div>
  <div id="countdown"></div>

  <div id="raceContainer">
    <div id="track"></div>
    <div id="cupWrap">
      <div id="steam"></div>
      <div id="cup">☕</div>
    </div>
    <div id="finish">🏁</div>
  </div>

  <script>
    const status = document.getElementById("status");
    const result = document.getElementById("result");
    const countdown = document.getElementById("countdown");

    const race = document.getElementById("raceContainer");
    const cupWrap = document.getElementById("cupWrap");
    const steam = document.getElementById("steam");

    function checkFika() {
      const now = new Date();

      const day = now.getDay(); // 0 = söndag, 6 = lördag
      const hour = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();

      const currentTotal = hour * 60 + minutes + seconds / 60;

      const fikaStart = 15 * 60;
      const fikaEnd = fikaStart + 15;

      const isWeekend = (day === 0 || day === 6);
      const isFridayAfterFika = (day === 5 && currentTotal > fikaEnd);

      result.classList.remove("pulse");
      steam.style.display = "none";

      /* ===== HELG ===== */
      if (isWeekend || isFridayAfterFika) {

        status.textContent = "";
        result.textContent = "NU ÄR DET HELG 🎉";

        race.style.display = "none";

        // nästa måndag 15:00
        let daysUntilMonday = (8 - day) % 7;
        if (daysUntilMonday === 0) daysUntilMonday = 7;

        const totalMinutes =
          daysUntilMonday * 24 * 60 +
          (fikaStart - currentTotal);

        const h = Math.floor(totalMinutes / 60);
        const m = Math.floor(totalMinutes % 60);

        countdown.textContent =
          `Nästa fika om ${h}h ${m}m (måndag 15:00)`;

        return;
      }

      /* ===== RACE ===== */
      if (currentTotal >= 14 * 60 + 45) {
        race.style.display = "block";

        const raceStart = 14 * 60 + 45;
        const duration = 15 * 60;
        const elapsed = (currentTotal - raceStart) * 60;

        let progress = elapsed / duration;
        if (progress > 1) progress = 1;

        const trackWidth = race.offsetWidth - 40;
        cupWrap.style.left = (progress * trackWidth) + "px";
      } else {
        race.style.display = "none";
      }

      /* ===== SNART ===== */
      if (currentTotal >= fikaStart - 5 && currentTotal < fikaStart) {
        status.textContent = "";
        result.textContent = "SNART ☕";
        result.classList.add("pulse");
        steam.style.display = "block";
        countdown.textContent = "";
      }

      /* ===== FIKA ===== */
      else if (currentTotal >= fikaStart && currentTotal <= fikaEnd) {
        status.textContent = "";
        result.textContent = "JA ☕";
        countdown.textContent = "";
      }

      /* ===== NEJ ===== */
      else {
        status.textContent = "";
        result.textContent = "NEJ";

        let nextFika = fikaStart;
        if (currentTotal > fikaEnd) {
          nextFika = fikaStart + 24 * 60;
        }

        const diff = Math.max(0, nextFika - currentTotal);

        const h = Math.floor(diff / 60);
        const m = Math.floor(diff % 60);
        const s = Math.floor((diff * 60) % 60);

        countdown.textContent =
          `Nästa fika om ${h > 0 ? h + "h " : ""}${m}m ${s}s`;
      }
    }

    checkFika();
    setInterval(checkFika, 1000);
  </script>
</body>
</html>
